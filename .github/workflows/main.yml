name: Main workflow

on:
  push:
    branches:
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: store_default
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Wait for PostgreSQL
      run: |
        echo "Waiting for PostgreSQL to be ready..."
        for i in {1..30}; do
          if pg_isready -h localhost -p 5432 -U user; then
            echo "PostgreSQL is ready!"
            exit 0
          fi
          echo "Attempt $i: PostgreSQL not ready yet..."
          sleep 2
        done
        echo "PostgreSQL failed to start"
        exit 1

    - name: Debug PostgreSQL
      run: |
        echo "=== Docker containers ==="
        docker ps -a
        echo "=== PostgreSQL logs ==="
        docker logs $(docker ps -aq -f name=postgres) 2>&1 || echo "No PostgreSQL container found"
        echo "=== Testing connection ==="
        PGPASSWORD=password psql -h localhost -U user -d store_default -c "SELECT 1;" || echo "Cannot connect to database"

    - name: Set up JDK
      uses: actions/setup-java@v2
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install Flyway
      run: |
        curl -L -o flyway-commandline.tar.gz "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/11.1.0/flyway-commandline-11.1.0-linux-x64.tar.gz"
        tar -xzf flyway-commandline.tar.gz
        sudo ln -s `pwd`/flyway-11.1.0/flyway /usr/local/bin/flyway

    - name: Run Flyway migrations
      run: |
        flyway migrate \
          -url="jdbc:postgresql://localhost:5432/store_default" \
          -user="user" \
          -password="password" \
          -locations="filesystem:migrations"

    - name: Download and setup autotests binaries
      run: |
        echo "Downloading tests..."
        wget -qO- --timeout=30 --tries=3 \
          "https://cloud-services-engineer.gitlab.yandexcloud.net/practicum-cloud-services/dbops-autotests/-/package_files/1/download" > dbopstest || echo "Failed to download tests"
        if [ -f dbopstest ]; then
          chmod +x ./dbopstest
          mv ./dbopstest /usr/local/bin/dbopstest
          echo "Tests installed successfully"
        else
          echo "Tests download failed, continuing without tests"
        fi

    - name: Test
      run: |
        if command -v dbopstest &> /dev/null; then
          dbopstest \
            -test.v \
            -host=localhost \
            -port=5432 \
            -user=user \
            -password=password \
            -db=store_default
        else
          echo "Tests not available, skipping"
        fi
